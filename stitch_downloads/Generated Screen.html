<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>拆书工坊 - EPUB 电子书管理</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#ff4d4d',
            darkbg: '#0f172a', // Deep blue-purple background
            glass: 'rgba(30, 41, 59, 0.7)',
          },
          borderRadius: {
            'custom': '8px',
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-glassmorphism">
    body {
      background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
      min-height: 100vh;
      color: #f8fafc;
      font-family: 'Inter', sans-serif;
    }
    .glass-panel {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .orange-glow:hover {
      box-shadow: 0 0 20px rgba(255, 77, 77, 0.4);
      border-color: #ff4d4d;
      transition: all 0.3s ease;
    }
    .gradient-text {
      background: linear-gradient(135deg, #ff4d4d 0%, #f97316 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body class="p-4 md:p-8">
<!-- BEGIN: MainHeader -->
<header class="max-w-7xl mx-auto flex justify-between items-center mb-12" data-purpose="site-header">
<div class="flex items-center gap-2">
<h1 class="text-3xl font-bold gradient-text">📚 拆书工坊</h1>
</div>
<button class="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-custom transition-all" data-purpose="settings-trigger" onclick="toggleModal('settings-modal')">
<span>⚙️</span>
<span class="text-sm font-medium">设置模型</span>
</button>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: MainContent -->
<main class="max-w-7xl mx-auto">
<!-- BEGIN: BookGrid -->
<section class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6" data-purpose="library-grid">
<!-- Upload Card -->
<div class="aspect-[2/3] glass-panel rounded-custom border-2 border-dashed border-white/20 flex flex-col items-center justify-center cursor-pointer hover:border-primary/50 transition-colors group" data-purpose="upload-card">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="text-primary text-2xl">+</span>
</div>
<p class="text-sm font-medium text-white/70">上传新书</p>
<p class="text-[10px] text-white/40 mt-1">支持 EPUB 拖拽</p>
</div>
<!-- Sample Book Card 1 -->
<div class="group cursor-pointer" data-purpose="book-card">
<div class="aspect-[2/3] glass-panel rounded-custom overflow-hidden mb-3 orange-glow relative">
<img alt="Book Cover" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWSPJ-P02UNBAqgw2GCQPZVVs_l5JEVo6iF_A2sp18fV1muRkVR3sEHWMnLFnAZcUq3hkkGb8ag3t3-ffIfifqwvPTO5Qi0eSewpjZ1m0Y4KMSohDQQ8QT8m9H2AM7ioFcA_UiVfK_2KLAfugQgtVon7_99sdsPKTXzXcXN0L0fUZuudVLpTSncB43SDaqQseSOF5HGmCfGksGsfRT_mkI-LztcmYYFOA35JPNKgx_rxpOKK-MH5fCBZxCnK-LEfzrteGazDzWHQ1u"/>
<div class="absolute bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-black/80 to-transparent">
<span class="text-[10px] bg-primary/80 text-white px-2 py-0.5 rounded-full uppercase font-bold tracking-wider">Completed</span>
</div>
</div>
<h3 class="text-sm font-semibold truncate">了不起的盖茨比</h3>
<p class="text-xs text-white/50">9 章节已拆解</p>
</div>
<!-- Sample Book Card 2 -->
<div class="group cursor-pointer" data-purpose="book-card">
<div class="aspect-[2/3] glass-panel rounded-custom overflow-hidden mb-3 orange-glow">
<img alt="Book Cover" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDJmJ_Xr7lzpFxxTDOlyuwMje6zM7uynXeqWniEk75WJ_C3hnklNn5Gi2-cXr7iExMuGuamvQZlAfpkwrIXK37yjhYtAd5CVGtOcDQCtZJuGAW4wAZn8GUVGyEnyw-s6PE3wyvGs9wwnq9tKD_oeawrIRbPbouu2Fi5rNLjjBRyTWl85f2gf5uuFA5EOOyQmD2-BDhAvkSGIoRS6GgY_xDF7ufhKjreQpO9cSKkcAF11tXmuAEjBPRAxg4c7uyhLM5mLhx6ycazIBhP"/>
</div>
<h3 class="text-sm font-semibold truncate">深度工作</h3>
<p class="text-xs text-white/50">7 章节已拆解</p>
</div>
<!-- Loading State Example -->
<div class="group" data-purpose="loading-state-card">
<div class="aspect-[2/3] glass-panel rounded-custom flex flex-col items-center justify-center p-4 text-center">
<div class="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
<p class="text-xs font-medium text-primary">正在提取章节...</p>
<p class="text-[10px] text-white/40 mt-1">生成封面中</p>
</div>
<h3 class="text-sm font-semibold truncate text-white/30">处理中...</h3>
<p class="text-xs text-white/20">-- 章节</p>
</div>
</section>
<!-- END: BookGrid -->
<!-- BEGIN: EmptyState (Hidden by default, shown for demo purpose below grid) -->
<section class="mt-20 flex flex-col items-center justify-center py-20 border-t border-white/5" data-purpose="empty-state">
<div class="opacity-20 mb-4 text-6xl">📭</div>
<p class="text-white/50 text-lg">暂无拆解记录</p>
<p class="text-white/30 text-sm mt-2">点击上方“上传新书”开始您的第一本电子书拆解之旅</p>
</section>
<!-- END: EmptyState -->
</main>
<!-- END: MainContent -->
<!-- BEGIN: SettingsModal -->
<div class="fixed inset-0 z-50 flex items-center justify-center modal-backdrop hidden" data-purpose="modal-container" id="settings-modal">
<div class="glass-panel w-full max-w-md mx-4 p-6 rounded-custom shadow-2xl">
<div class="flex justify-between items-center mb-6">
<h2 class="text-xl font-bold">模型设置</h2>
<button class="text-white/50 hover:text-white" onclick="toggleModal('settings-modal')">×</button>
</div>
<div class="space-y-4">
<div data-purpose="form-group">
<label class="block text-xs font-medium text-white/60 mb-1.5 uppercase tracking-wider">API Key</label>
<input class="w-full bg-black/20 border border-white/10 rounded-custom px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="sk-..." type="password"/>
</div>
<div data-purpose="form-group">
<label class="block text-xs font-medium text-white/60 mb-1.5 uppercase tracking-wider">API Base URL</label>
<input class="w-full bg-black/20 border border-white/10 rounded-custom px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="https://api.openai.com/v1" type="text"/>
</div>
<div data-purpose="form-group">
<label class="block text-xs font-medium text-white/60 mb-1.5 uppercase tracking-wider">模型选择</label>
<select class="w-full bg-black/20 border border-white/10 rounded-custom px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all" id="model-select" onchange="handleModelChange(this.value)">
<option class="bg-darkbg" value="gpt-4o">GPT-4o</option>
<option class="bg-darkbg" value="claude-3-5">Claude 3.5 Sonnet</option>
<option class="bg-darkbg" value="custom">Custom (自定义)</option>
</select>
</div>
<div class="hidden" data-purpose="custom-model-group" id="custom-model-input">
<label class="block text-xs font-medium text-white/60 mb-1.5 uppercase tracking-wider">自定义模型名称</label>
<input class="w-full bg-black/20 border border-white/10 rounded-custom px-3 py-2 text-sm focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="e.g. gpt-4-turbo" type="text"/>
</div>
</div>
<div class="flex gap-3 mt-8">
<button class="flex-1 px-4 py-2 border border-white/10 rounded-custom text-sm font-medium hover:bg-white/5 transition-all" onclick="toggleModal('settings-modal')">
          取消
        </button>
<button class="flex-1 px-4 py-2 bg-primary text-white rounded-custom text-sm font-bold hover:brightness-110 transition-all shadow-lg shadow-primary/20">
          保存设置
        </button>
</div>
</div>
</div>
<!-- END: SettingsModal -->
<!-- BEGIN: Scripts -->
<script data-purpose="ui-logic">
    function toggleModal(id) {
      const modal = document.getElementById(id);
      modal.classList.toggle('hidden');
    }

    function handleModelChange(value) {
      const customInput = document.getElementById('custom-model-input');
      if (value === 'custom') {
        customInput.classList.remove('hidden');
      } else {
        customInput.classList.add('hidden');
      }
    }

    // Close modal on click outside
    window.onclick = function(event) {
      const modal = document.getElementById('settings-modal');
      if (event.target === modal) {
        modal.classList.add('hidden');
      }
    }
  </script>
<!-- END: Scripts -->
</body></html>
